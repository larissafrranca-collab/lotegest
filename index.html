<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loteamento</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      padding-top: 50px;
    }

    .card {
      background: white;
      padding: 30px;
      margin: auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2c3e50;
    }

    p {
      color: #555;
    }

    button {
      background-color: #2ecc71;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #27ae60;
    }
  </style>

</head>

<body>

  <div class="card">
    <h1>Sistema de Loteamento 🚀</h1>
    <p>Agora sim, funcionando bonito!</p>
    <button>Cadastrar cliente</button>
  </div>

</body>
</html>
